name: Fetch Twitch Stats

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write              # needed to push stats.json back to repo

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Twitch data and write stats.json
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          # Get app access token
          TOKEN=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d "client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_CLIENT_SECRET}&grant_type=client_credentials" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Get user info (to grab user ID)
          USER=$(curl -s "https://api.twitch.tv/helix/users?login=toptiernas" \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}")
          USER_ID=$(echo $USER | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")

          # Get stream info (live status + viewer count)
          STREAM=$(curl -s "https://api.twitch.tv/helix/streams?user_login=toptiernas" \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}")
          IS_LIVE=$(echo $STREAM | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print('true' if len(d)>0 else 'false')")
          VIEWERS=$(echo $STREAM | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print(d[0]['viewer_count'] if len(d)>0 else 0)")

          # Get follower count
          FOLLOWERS=$(curl -s "https://api.twitch.tv/helix/channels/followers?broadcaster_id=${USER_ID}" \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")

          # Write stats.json
          jq -n \
            --argjson is_live "$IS_LIVE" \
            --argjson viewer_count "$VIEWERS" \
            --argjson follower_count "$FOLLOWERS" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{is_live: $is_live, viewer_count: $viewer_count, follower_count: $follower_count, updated_at: $updated_at}' \
            > stats.json

      - name: Commit stats.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --staged --quiet || git commit -m "chore: update Twitch stats"
          git push
